<div id="root"></div>

<script type="text/babel" data-presets="react">
// ===========================================================================
// CONFIG — paste your Spotify app's Client ID here.
// Create an app at https://developer.spotify.com/dashboard (free), then add
// the redirect URI shown on the connect screen to the app's settings.
// The Client ID is not a secret; this app uses the Authorization Code + PKCE
// flow, so no client secret is ever needed or stored.
// ===========================================================================
const CONFIG = {
  clientId: '1b99b368fe8c474dbc03173ccf2178c7',
  scopes: [
    'streaming',                      // Web Playback SDK
    'user-read-email','user-read-private',   // required by the SDK
    'user-read-playback-state','user-modify-playback-state','user-read-currently-playing',
    'user-read-recently-played',
    'playlist-read-private','playlist-read-collaborative',
    'user-top-read',
    'user-library-read','user-library-modify'
  ]
};
// Redirect back to exactly this page (query stripped). Register this EXACT
// value in the Spotify dashboard.
const REDIRECT_URI = location.origin + location.pathname;
const TOKEN_KEY = 'wax-spotify-tokens';
const VERIFIER_KEY = 'wax-pkce-verifier';
const CONFIGURED = CONFIG.clientId && CONFIG.clientId !== 'PASTE_YOUR_CLIENT_ID_HERE';
// Spotify rejects file:// redirect URIs and the Playback SDK needs a secure
// context, so the app must be served over http://127.0.0.1 (or https).
const SERVED_OK = location.protocol === 'http:' || location.protocol === 'https:';
const SERVE_URL = 'http://127.0.0.1:5173/index.html';

// --- PKCE auth --------------------------------------------------------------
function randStr(n){const a=new Uint8Array(n);crypto.getRandomValues(a);
  return Array.from(a,b=>('0'+(b&0xff).toString(16)).slice(-2)).join('');}
function b64url(bytes){let s=btoa(String.fromCharCode.apply(null,bytes));
  return s.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
async function challengeFor(verifier){
  const digest=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(verifier));
  return b64url(new Uint8Array(digest));}
async function beginAuth(){
  const verifier=randStr(48);
  localStorage.setItem(VERIFIER_KEY,verifier);
  const state=randStr(8); sessionStorage.setItem('wax-auth-state',state);
  const p=new URLSearchParams({client_id:CONFIG.clientId,response_type:'code',
    redirect_uri:REDIRECT_URI,code_challenge_method:'S256',
    code_challenge:await challengeFor(verifier),state,scope:CONFIG.scopes.join(' ')});
  location.href='https://accounts.spotify.com/authorize?'+p.toString();
}
function getTokens(){try{return JSON.parse(localStorage.getItem(TOKEN_KEY));}catch(e){return null;}}
function storeTokens(j){
  const prev=getTokens();
  const rec={access_token:j.access_token,
    refresh_token:j.refresh_token||(prev&&prev.refresh_token),
    expires_at:Date.now()+(j.expires_in*1000)};
  localStorage.setItem(TOKEN_KEY,JSON.stringify(rec));
  return rec;
}
async function exchangeCode(code){
  const verifier=localStorage.getItem(VERIFIER_KEY);
  const body=new URLSearchParams({grant_type:'authorization_code',code,
    redirect_uri:REDIRECT_URI,client_id:CONFIG.clientId,code_verifier:verifier});
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok) throw new Error('Token exchange failed ('+r.status+')');
  return storeTokens(await r.json());
}
async function refreshTokens(){
  const t=getTokens(); if(!t||!t.refresh_token) throw new Error('No refresh token');
  const body=new URLSearchParams({grant_type:'refresh_token',
    refresh_token:t.refresh_token,client_id:CONFIG.clientId});
  const r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok){localStorage.removeItem(TOKEN_KEY);throw new Error('Session expired ('+r.status+')');}
  return storeTokens(await r.json());
}
async function validToken(){
  let t=getTokens(); if(!t) return null;
  if(Date.now()>t.expires_at-60000){t=await refreshTokens();}
  return t.access_token;
}
function logout(){localStorage.removeItem(TOKEN_KEY);location.href=REDIRECT_URI;}

// --- Web API helper ---------------------------------------------------------
async function api(path,opts={}){
  const token=await validToken();
  if(!token) throw Object.assign(new Error('Not authenticated'),{status:401});
  const r=await fetch('https://api.spotify.com/v1'+path,{
    method:opts.method||'GET',
    headers:Object.assign({Authorization:'Bearer '+token},opts.body?{'Content-Type':'application/json'}:{}),
    body:opts.body?JSON.stringify(opts.body):undefined});
  if(r.status===401&&!opts._retry){try{await refreshTokens();}catch(e){}return api(path,Object.assign({},opts,{_retry:true}));}
  if(r.status===204||r.status===202) return null;
  if(!r.ok){
    // Spotify explains the failure in the body — keep it, a bare status is useless.
    let detail='';
    try{const j=await r.json();detail=(j&&j.error&&j.error.message)||'';}catch(e){}
    throw Object.assign(new Error('Spotify API '+r.status+(detail?': '+detail:'')),
      {status:r.status,detail:detail});
  }
  const ct=r.headers.get('content-type')||'';
  return ct.indexOf('json')>=0?r.json():null;
}
function whenSdkReady(){return new Promise(res=>{
  if(window.Spotify) return res();
  window.onSpotifyWebPlaybackSDKReady=()=>res();});}

// --- helpers ----------------------------------------------------------------
function css(text){const o={};String(text).split(';').forEach(decl=>{
  const i=decl.indexOf(':'); if(i<0)return;
  const k=decl.slice(0,i).trim(), val=decl.slice(i+1).trim(); if(!k)return;
  o[k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase())]=val;});return o;}
function artCss(url){return url?
  "background-color:#26272b;background-image:url('"+url+"');background-size:cover;background-position:center":
  "background:#26272b";}
function mapTrack(t){if(!t)return null;
  const imgs=(t.album&&t.album.images)||t.images||[]; // Spotify orders images largest-first
  const at=i=>imgs.length?(imgs[Math.min(i,imgs.length-1)]||imgs[0]).url:'';
  return {id:t.id,uri:t.uri,title:t.name||'',
    artist:(t.artists||[]).map(a=>a.name).join(', '),
    album:t.album?t.album.name:'',
    artUrl:at(0),            // largest (~640px) — Now Playing hero art
    artThumb:at(1),          // mid (~300px) — list thumbnails
    dur:Math.round((t.duration_ms||0)/1000)};}
// Parse an LRC lyric string into sorted {t (seconds), text} lines.
function parseLrc(lrc){
  const out=[],re=/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g;
  String(lrc||'').split('\n').forEach(line=>{
    const stamps=line.match(re); if(!stamps)return;
    const text=line.replace(re,'').trim();
    stamps.forEach(s=>{const m=s.match(/\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/);
      const t=(+m[1])*60+(+m[2])+(m[3]?(+((m[3]+'00').slice(0,3)))/1000:0);
      out.push({t,text});});
  });
  return out.sort((a,b)=>a.t-b.t);
}
// Visualizer response curve for live audio. Music puts most of its energy in the
// low end, so the bass bars would otherwise sit pinned at full height. Total gain
// per bar = VIZ_BASS_CUT + VIZ_TILT * (bar position ^ VIZ_TILT_CURVE), i.e. the
// lowest bars top out at 80% of their true level while the quiet highs get up to
// ~2.8x. Tweak these three to taste.
const VIZ_BASS_CUT = .8;     // ceiling for the lowest bars (0.8 = 80%)
const VIZ_TILT = 2.0;        // extra sensitivity applied toward the high end
const VIZ_TILT_CURVE = 1.15; // how quickly that boost ramps in
// Fraction of the FFT spectrum the bars span. Streaming codecs roll off above
// ~16kHz, so mapping bars up to Nyquist just leaves the top few permanently at
// zero. 0.66 of 24kHz ≈ 15.8kHz, which keeps every bar carrying signal.
const VIZ_TOP = .66;
const DEFAULT_EQ=[.5,.62,.55,.42,.5];
const EQ_PRESETS=[
  ['Flat',[.5,.5,.5,.5,.5]],
  ['Bass',[.92,.74,.52,.42,.4]],
  ['Vocal',[.4,.5,.76,.7,.5]],
  ['Treble',[.4,.42,.5,.72,.92]],
  ['Rock',[.72,.52,.46,.6,.74]],
  ['Elec',[.82,.56,.4,.56,.82]]
];
// tiny hsl round-trip so the "adapt" theme can pull a vivid accent from art
function rgb2hsl(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let h,s,l=(mx+mn)/2;if(mx===mn){h=s=0;}else{const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
  h=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4;h/=6;}return [h,s,l];}
function hsl2hex(h,s,l){const f=n=>{const k=(n+h*12)%12;const a=s*Math.min(l,1-l);
  const c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return ('0'+Math.round(c*255).toString(16)).slice(-2);};
  return '#'+f(0)+f(8)+f(4);}

class Dashboard extends React.Component {
  constructor(props){
    super(props);
    this.WDEF=[
      {id:'now',name:'Now Playing',span:[2,2]},
      {id:'viz',name:'Visualizer',span:[2,2],alt:[2,1]},
      {id:'lyrics',name:'Lyrics',span:[1,2],alt:[2,2]},
      {id:'queue',name:'Up Next · Queue',span:[1,2],alt:[1,3]},
      {id:'pl',name:'Playlists',span:[1,2],alt:[1,1]},
      {id:'eq',name:'Volume & EQ',span:[1,1]},
      {id:'dev',name:'Output',span:[1,1]},
      {id:'recs',name:'Suggestions',span:[2,1]},
      {id:'stats',name:'Session Stats',span:[1,1]},
      {id:'clock',name:'Clock',span:[1,1]},
      {id:'hist',name:'Recently Played',span:[2,1],alt:[4,1]},
      {id:'facts',name:'Fun Facts',span:[2,1]},
      {id:'search',name:'Search',span:[1,2],alt:[2,2]}
    ];
    this.themes=[{name:'Adapt to art',key:'adapt'},{name:'Teal',key:'#4fd8c0'},{name:'Ember',key:'#f0956b'},{name:'Cobalt',key:'#7d9bef'},{name:'Lime',key:'#9ed36a'},{name:'Orchid',key:'#d97fd0'},{name:'Gold',key:'#f2c95c'}];
    this.vizRef=React.createRef(); this.lyrRef=React.createRef(); this.gridRef=React.createRef();
    let saved={}; try{saved=JSON.parse(localStorage.getItem('wax-dash')||'{}')}catch(e){}
    const w={}; this.WDEF.forEach((d,i)=>{const sv=saved.w&&saved.w[d.id];
      w[d.id]={o:sv&&typeof sv.o==='number'?sv.o:i,on:sv?!!sv.on:true,big:sv?!!sv.big:false};});
    this.state={
      // playback (from the Web Playback SDK)
      track:null,playing:false,posMs:0,durMs:0,shuffle:false,repeat:0,liked:false,vol:.5,
      artColor:null,
      // remote data (Web API)
      devices:[],queue:[],playlists:[],recent:[],topTracks:[],topArtist:'',
      // lyrics (LRCLIB)
      lyrics:null,lyricsPlain:null,lyricsState:'none',lyricsFor:null,
      // fun facts (Groq via serve.py proxy)
      fact:null,factState:'none',factMsg:'',factFor:null,
      // search
      q:'',searchType:'track',results:[],searching:false,
      // ui
      w,fs:null,menuOpen:false,themeOpen:false,activePl:null,
      viz:saved.viz||null,eq:(saved.eq&&saved.eq.length===5)?saved.eq:DEFAULT_EQ.slice(),eqPreset:saved.eqPreset||'Default',
      theme:saved.theme||'adapt',barOpen:saved.barOpen===undefined?true:!!saved.barOpen,
      // status + session
      status:'Connecting…',error:null,clock:new Date(),listen:0,played:0,
      // responsive layout
      vw:window.innerWidth,gridH:null,
      // live audio capture for the visualizer
      liveAudio:false
    };
    this.deviceId=null; this._lastTrackId=null; this._lyrCache={}; this._factCache={};
  }
  // --- utilities ------------------------------------------------------------
  hexA(h,a){const n=parseInt(h.slice(1),16);return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')';}
  fmt(s){s=Math.max(0,Math.floor(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  save(){try{localStorage.setItem('wax-dash',JSON.stringify({w:this.state.w,viz:this.state.viz,theme:this.state.theme,barOpen:this.state.barOpen,eq:this.state.eq,eqPreset:this.state.eqPreset}));}catch(e){}}
  accent(){return this.state.theme==='adapt'?(this.state.artColor||'#4fd8c0'):this.state.theme;}
  vizMode(){return this.state.viz||'bars';}
  greyIf(on){return on?this.accent():'rgba(255,255,255,.42)';}

  // --- Spotify SDK wiring ---------------------------------------------------
  componentDidMount(){
    whenSdkReady().then(()=>this.initPlayer()).catch(e=>this.setState({error:String(e.message||e)}));
    this._clk=setInterval(()=>this.setState({clock:new Date()}),1000);
    this._tick=setInterval(()=>{if(!this.state.playing)return;
      this.setState(s=>({posMs:Math.min(s.durMs||s.posMs,s.posMs+250),listen:s.listen+.25}));},250);
    this._sync=setInterval(()=>{if(this.player)this.player.getCurrentState().then(st=>{if(st)this.applyState(st);});},4000);
    this._poll=setInterval(()=>{this.refreshDevices();this.refreshQueue();},8000);
    this._reci=setInterval(()=>this.refreshRecent(),30000);
    this._esc=(e)=>{if(e.key==='Escape')this.setState({fs:null,menuOpen:false,themeOpen:false});};
    window.addEventListener('keydown',this._esc);
    const loop=(ts)=>{this._raf=requestAnimationFrame(loop);this.drawViz(ts/1000);};
    this._raf=requestAnimationFrame(loop);
    this._onResize=()=>{this.setState({vw:window.innerWidth});this.measureGrid();};
    window.addEventListener('resize',this._onResize);
    this.measureGrid();
  }
  componentWillUnmount(){[this._clk,this._tick,this._sync,this._poll,this._reci].forEach(clearInterval);
    cancelAnimationFrame(this._raf);window.removeEventListener('keydown',this._esc);
    window.removeEventListener('resize',this._onResize);
    clearTimeout(this._searchT);
    this.stopLive();
    if(this.player)this.player.disconnect();}
  componentDidUpdate(){const a=this.actLine();
    if(a!==this._lastA){this._lastA=a;const el=this.lyrRef.current,ch=el&&a>=0&&el.children[a];
      if(ch)el.scrollTo({top:ch.offsetTop-el.clientHeight/2+ch.offsetHeight/2,behavior:'smooth'});}
    this.measureGrid();}
  // columns shrink on narrower/portrait screens; rows stretch to fill height
  cols(){const vw=this.state.vw;return vw>=1180?4:vw>=860?3:vw>=560?2:1;}
  gridStyle(){const h=this.state.gridH;
    return 'display:grid;grid-template-columns:repeat('+this.cols()+',1fr);grid-auto-rows:minmax(150px,1fr);gap:14px;grid-auto-flow:dense'+(h?';height:'+h+'px':'');}
  measureGrid(){const el=this.gridRef.current;if(!el)return;
    const top=el.getBoundingClientRect().top;
    const h=Math.max(300,Math.round(window.innerHeight-top-26));
    if(Math.abs((this.state.gridH||0)-h)>2)this.setState({gridH:h});}

  initPlayer(){
    const player=new Spotify.Player({name:'Wax',volume:this.state.vol,
      getOAuthToken:cb=>{validToken().then(t=>cb(t)).catch(()=>{});}});
    this.player=player;
    player.addListener('ready',({device_id})=>{
      this.deviceId=device_id;
      this.setState({status:null});
      this.transfer(device_id,false);
      player.getVolume().then(v=>this.setState({vol:v})).catch(()=>{});
      this.refreshAll();
    });
    player.addListener('not_ready',()=>this.setState({status:'Device offline'}));
    player.addListener('player_state_changed',st=>{if(st)this.applyState(st);});
    ['initialization_error','authentication_error','account_error','playback_error'].forEach(ev=>
      player.addListener(ev,({message})=>this.setState({error:message||ev.replace(/_/g,' ')})));
    player.connect().then(ok=>{if(!ok)this.setState({error:'Could not connect the player. A Premium account is required.'});});
  }
  applyState(st){
    const t=mapTrack(st.track_window.current_track);
    if(!t)return;
    const prev=this._lastTrackId;
    this.setState(s=>({track:t,playing:!st.paused,posMs:st.position,durMs:st.duration,
      shuffle:!!st.shuffle,repeat:st.repeat_mode|0,
      played:(prev&&prev!==t.id)?s.played+1:s.played}));
    if(prev!==t.id){this._lastTrackId=t.id;this.refreshLiked(t.id);this.refreshQueue();
      this.extractColor(t.artUrl);this.fetchLyrics(t);this.fetchFact(t);}
  }
  // Fetch an AI fun fact from Groq via the same-origin serve.py proxy.
  async fetchFact(track,force){
    if(!track){this.setState({fact:null,factState:'none',factFor:null});return;}
    const id=track.id,tag=id+(force?':'+Date.now():'');this._factReq=tag;
    if(!force&&this._factCache[id]){this.setState({fact:this._factCache[id],factState:'ok',factFor:id});return;}
    this.setState({factState:'loading',factFor:id,fact:force?this.state.fact:null});
    try{
      const p=new URLSearchParams({title:track.title,artist:track.artist,album:track.album||'',n:String(Date.now())});
      const r=await fetch('/api/funfact?'+p.toString());
      const j=await r.json().catch(()=>({}));
      if(this._factReq!==tag)return;
      if(r.ok&&j.fact){this._factCache[id]=j.fact;this.setState({fact:j.fact,factState:'ok',factFor:id});}
      else this.setState({factState:'error',factMsg:j.error||'Fun facts unavailable',factFor:id});
    }catch(e){if(this._factReq===tag)this.setState({factState:'error',factMsg:'Run the app with serve.py to enable fun facts',factFor:id});}
  }
  factRefresh=()=>this.fetchFact(this.state.track,true);
  // --- search -----------------------------------------------------------------
  onSearchInput=(e)=>{const q=e.target.value;this.setState({q});
    clearTimeout(this._searchT);
    if(!q.trim()){this._searchReq=null;this.setState({results:[],searching:false});return;}
    this._searchT=setTimeout(()=>this.runSearch(q),350);};
  onSearchKey=(e)=>{if(e.key==='Enter'){clearTimeout(this._searchT);
    if(this.state.q.trim())this.runSearch(this.state.q);}};
  clearSearch=()=>{clearTimeout(this._searchT);this._searchReq=null;
    this.setState({q:'',results:[],searching:false});};
  setSearchType=(t)=>this.setState({searchType:t,results:[]},()=>{
    if(this.state.q.trim())this.runSearch(this.state.q);});
  async runSearch(q){
    const type=this.state.searchType,tag=q+'|'+type;this._searchReq=tag;
    this.setState({searching:true});
    try{
      const r=await api('/search?'+new URLSearchParams({q:q,type:type,limit:'20'}).toString());
      if(this._searchReq!==tag)return;
      const items=(r&&r[type+'s']&&r[type+'s'].items)||[];
      this.setState({results:items.filter(Boolean).map(it=>this.mapResult(it,type)),searching:false});
    }catch(e){if(this._searchReq===tag)
      this.setState({searching:false,error:'Search failed: '+(e.detail||e.message)});}
  }
  mapResult(it,type){
    const imgs=(it.album&&it.album.images)||it.images||[];
    const art=imgs.length?imgs[imgs.length-1].url:'';
    const by=(it.artists||[]).map(a=>a.name).join(', ');
    if(type==='track')return{id:it.id,uri:it.uri,kind:'track',title:it.name,sub:by,meta:this.fmt(Math.round((it.duration_ms||0)/1000)),art};
    if(type==='album')return{id:it.id,uri:it.uri,kind:'album',title:it.name,sub:by,meta:(it.release_date||'').slice(0,4),art};
    if(type==='artist')return{id:it.id,uri:it.uri,kind:'artist',title:it.name,sub:'Artist',meta:'',art};
    return{id:it.id,uri:it.uri,kind:'playlist',title:it.name,sub:it.owner&&it.owner.display_name?it.owner.display_name:'Playlist',
      meta:it.tracks?it.tracks.total+' tr':'',art};
  }
  searchPlay(r){if(r.kind==='track')this.playUris([r.uri]);else this.playContext(r.uri);}
  // Fetch synced/plain lyrics from LRCLIB (free, no key, CORS-enabled).
  async fetchLyrics(track){
    if(!track){this.setState({lyrics:null,lyricsPlain:null,lyricsState:'none',lyricsFor:null});return;}
    const id=track.id; this._lyrReq=id;
    const cached=this._lyrCache[id];
    if(cached){this.setState({lyrics:cached.synced,lyricsPlain:cached.plain,lyricsState:cached.state,lyricsFor:id});return;}
    this.setState({lyrics:null,lyricsPlain:null,lyricsState:'loading',lyricsFor:id});
    const artist=(track.artist||'').split(',')[0].trim();
    const apply=(synced,plain,state)=>{this._lyrCache[id]={synced,plain,state};

      const c=document.createElement('canvas');c.width=c.height=16;

      if(!n){for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}}

  // --- live audio capture -----------------------------------------------------
  // Spotify's SDK audio is DRM-protected, so it can't be fed into an AnalyserNode
  // directly. Instead we capture the tab/system audio output and FFT that.
  toggleLive=async()=>{
    if(this.state.liveAudio){this.stopLive();return;}
    if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){
      this.setState({error:'This browser can\'t capture audio (getDisplayMedia unavailable).'});return;}
    try{
      const stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
      const tracks=stream.getAudioTracks();
      if(!tracks.length){stream.getTracks().forEach(t=>t.stop());
        this.setState({error:'No audio in that share — pick a source and tick "Share tab/system audio".'});return;}
      stream.getVideoTracks().forEach(t=>t.stop()); // audio only
      const Ctx=window.AudioContext||window.webkitAudioContext;
      const ctx=new Ctx();
      if(ctx.state==='suspended')ctx.resume();
      const an=ctx.createAnalyser();
      an.fftSize=512; an.smoothingTimeConstant=.7;
      ctx.createMediaStreamSource(new MediaStream(tracks)).connect(an);
      this._audioCtx=ctx;this._analyser=an;this._freq=new Uint8Array(an.frequencyBinCount);
      this._stream=stream;this._silentFrames=0;this._silentWarned=false;
      tracks[0].addEventListener('ended',()=>this.stopLive());
      this.setState({liveAudio:true,error:null});
    }catch(e){
      if(e&&e.name==='NotAllowedError')return; // user dismissed the picker
      this.setState({error:'Live audio failed: '+(e.message||e)});
    }
  };
  stopLive(){
    try{if(this._stream)this._stream.getTracks().forEach(t=>t.stop());}catch(e){}
    try{if(this._audioCtx)this._audioCtx.close();}catch(e){}
    this._stream=null;this._analyser=null;this._audioCtx=null;this._freq=null;
    this.setState({liveAudio:false});

  drawViz(t){const c=this.vizRef.current;if(!c)return;const w=c.clientWidth,h=c.clientHeight;if(!w||!h)return;
    const dpr=window.devicePixelRatio||1;
    if(c.width!==Math.round(w*dpr)||c.height!==Math.round(h*dpr)){c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);}
    const x=c.getContext('2d');x.setTransform(dpr,0,0,dpr,0,0);x.clearRect(0,0,w,h);

      for(let i=0;i<=N;i++){const a=(i%N)/N*Math.PI*2,v=S[i%N],r=r0*(.75+v*.7);

        down:(e)=>this.eqDown(i,e)})),
      eqPresets:EQ_PRESETS.map(p=>({name:p[0],active:s.eqPreset===p[0],pick:()=>this.eqPick(p[0],p[1])})),
      eqReset:this.eqReset,
      devices:s.devices.map(dv=>({name:dv.name,type:(dv.type||'').toUpperCase(),pick:()=>this.transfer(dv.id,true),
        dot:dv.is_active?ac:'rgba(255,255,255,.18)',fg:dv.is_active?'#ffffff':'rgba(255,255,255,.6)'})),
      recs:s.topTracks.slice(0,2).map(r=>({title:r.title,artist:r.artist,artUrl:r.artThumb,
        bd:this.hexA(ac,.45),fg:ac,add:()=>this.addQueue(r.uri)})),
      statMin:Math.floor(s.listen/60),statTracks:s.played,statTop:s.topArtist||(tk?tk.artist:'—'),
      clockTime:pad(hr)+':'+pad(d.getMinutes()),
      clockDate:d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}),
      greeting:hr<5?'LATE NIGHT':hr<12?'GOOD MORNING':hr<18?'GOOD AFTERNOON':'GOOD EVENING',
      hist:s.recent.map(h=>({title:h.title,artUrl:h.artThumb}))
    };
  }

  // --- render helpers -------------------------------------------------------
  ic(wid,on,title,glyph){return <button data-wid={wid} onClick={on} title={title} className="hw"
    style={css("border:none;background:transparent;cursor:pointer;padding:2px 5px;color:rgba(255,255,255,.35);font-size:11px;line-height:1")}>{glyph}</button>;}
  ctrls(v,wid,sz){return <span style={css("margin-left:auto;display:flex;gap:2px;align-items:center")}>
    {sz&&this.ic(wid,v.szClick,"Resize","⇲")}{this.ic(wid,v.fsClick,"Fullscreen","⤢")}{this.ic(wid,v.rmClick,"Remove","✕")}
    <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span></span>;}
  head(v,wid,label,padPx,sz){return <div draggable="true" data-wid={wid} onDragStart={v.dragStart}
    style={css("display:flex;align-items:center;gap:8px;padding:"+padPx+";cursor:grab;user-select:none")}>
    <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>{label}</span>
    {this.ctrls(v,wid,sz)}</div>;}
  card(v,wid,lay,children){return <div data-wid={wid} onDragOver={v.dragOver} onDragLeave={v.dragLeave} onDrop={v.drop}
    style={css("position:relative;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;"+lay)}>{children}</div>;}

  render(){
    const v=this.renderVals();
    return (
      <div style={css(`min-height:100vh;padding:20px 22px 26px;transition:background 1.2s;background:${v.bg}`)}>

        {(this.state.status||this.state.error)&&(
          <div style={css(`position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:9px;padding:8px 15px;border-radius:20px;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.06em;background:${this.state.error?'rgba(240,90,90,.16)':'rgba(255,255,255,.08)'};border:1px solid ${this.state.error?'rgba(240,90,90,.4)':'rgba(255,255,255,.14)'};color:${this.state.error?'#ff9d9d':'rgba(255,255,255,.7)'}`)}>
            {!this.state.error&&<span style={css("width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite")}></span>}
            <span>{this.state.error||this.state.status}</span>
            {this.state.error&&<span onClick={()=>this.setState({error:null})} style={css("cursor:pointer;margin-left:4px;opacity:.7")}>✕</span>}
          </div>
        )}

        {/* header bar */}
        <div style={{...css("display:flex;align-items:center;gap:10px;margin:2px 6px;transition:max-height .35s,opacity .35s,margin .35s"),...css(v.barSt)}}>
          {/* background-image, not the `background` shorthand: the shorthand resets
              background-clip, and React only rewrites changed properties — so a new
              gradient would wipe the text clip and paint a solid block. */}
          <span style={css(`font-family:'Archivo Black',sans-serif;font-size:26px;line-height:1;letter-spacing:.02em;text-transform:uppercase;background-image:${v.logoGrad};-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent`)}>Wax</span>
          <span style={css("font:500 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>SESSION DASHBOARD</span>
          <span style={css("margin-left:auto;font:500 10px ui-monospace,Menlo,monospace;letter-spacing:.1em;color:rgba(255,255,255,.3)")}>DRAG HEADERS TO REARRANGE</span>
          <button onClick={logout} title="Sign out of Spotify" className="hw" style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:6px 12px;border-radius:16px;cursor:pointer;border:1px solid rgba(255,255,255,.16);background:transparent;color:rgba(255,255,255,.5)")}>SIGN OUT</button>
          <div style={css("position:relative;flex:none")}>
            <button onClick={v.themeT} style={css(`font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:6px 12px;border-radius:16px;cursor:pointer;border:1px solid ${v.themeBd};background:${v.themeBg};color:${v.themeFg}`)}>THEME {"▾"}</button>
            {v.themeOpen&&(
              <div style={css("position:absolute;top:32px;right:0;z-index:90;background:#15161a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;min-width:190px;box-shadow:0 20px 50px rgba(0,0,0,.55);animation:dropIn .18s cubic-bezier(.2,.9,.3,1.2) both;transform-origin:top right")}>
                {v.themeItems.map((th,i)=>(
                  <div key={i} onClick={th.pick} className="hb6" style={css("display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer")}>
                    <span style={css(`width:12px;height:12px;border-radius:50%;flex:none;background:${th.swatch}`)}></span>
                    <span style={css(`font-size:13px;font-weight:500;color:${th.fg}`)}>{th.name}</span>
                  </div>))}
              </div>)}
          </div>
          <div style={css("position:relative;flex:none")}>
            <button onClick={v.menuT} style={css(`font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:6px 12px;border-radius:16px;cursor:pointer;border:1px solid ${v.menuBd};background:${v.menuBg};color:${v.menuFg}`)}>WIDGETS {"▾"}</button>
            {v.menuOpen&&(
              <div style={css("position:absolute;top:32px;right:0;z-index:90;background:#15161a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;min-width:210px;box-shadow:0 20px 50px rgba(0,0,0,.55);animation:dropIn .18s cubic-bezier(.2,.9,.3,1.2) both;transform-origin:top right")}>
                {v.menuItems.map((m,i)=>(
                  <div key={i} onClick={m.toggle} className="hb6" style={css("display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer")}>
                    <span style={css(`width:7px;height:7px;border-radius:50%;flex:none;background:${m.dot}`)}></span>
                    <span style={css(`font-size:13px;font-weight:500;color:${m.fg}`)}>{m.name}</span>
                  </div>))}
              </div>)}
          </div>
        </div>

        <div style={css("display:flex;justify-content:center;margin:0 0 10px")}>
          <button onClick={v.barT} title={v.barTip} className="hw" style={css("border:none;background:transparent;cursor:pointer;padding:2px 20px;color:rgba(255,255,255,.3);font-size:10px;line-height:1")}>{v.barGlyph}</button>
        </div>

        <div ref={this.gridRef} style={css(this.gridStyle())}>

          {/* NOW PLAYING */}
          {this.card(v,'now',v.layNow,<>
            {/* Canvas-style ambient backdrop: blurred album art, slowly drifting.
                Motion pauses with playback. Scrim keeps the text readable. */}
            {v.artUrl&&<>
              <div style={css(`position:absolute;inset:0;z-index:0;background-image:url('${v.artUrl}');background-size:cover;background-position:center;filter:blur(40px) saturate(1.6);opacity:.45;will-change:transform;animation:drift 26s ease-in-out infinite alternate;animation-play-state:${v.playing?'running':'paused'}`)}></div>
              <div style={css(`position:absolute;inset:0;z-index:0;background:radial-gradient(120% 100% at 12% 50%, ${this.hexA(v.accent,.2)}, rgba(0,0,0,0) 62%), linear-gradient(100deg, rgba(11,12,14,.93) 0%, rgba(11,12,14,.78) 48%, rgba(11,12,14,.62) 100%)`)}></div>
            </>}
            <div style={css("position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-height:0")}>
            {this.head(v,'now','NOW PLAYING','10px 14px 0',false)}
            <div style={css("flex:1;display:flex;gap:18px;padding:10px 20px 18px;min-height:0;align-items:center")}>
              <div style={css(`width:clamp(96px,34%,176px);flex:none;aspect-ratio:1;border-radius:14px;${artCss(v.artUrl)};box-shadow:0 14px 44px rgba(0,0,0,.5);will-change:transform;animation:artFloat 14s ease-in-out infinite alternate;animation-play-state:${v.playing?'running':'paused'}`)}></div>
              <div style={css("flex:1;min-width:0;display:flex;flex-direction:column;gap:4px")}>
                <div style={css("font-size:28px;font-weight:700;line-height:1.12;letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{v.title}</div>
                <div style={css("font-size:14px;color:rgba(255,255,255,.58);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{v.artist}{v.album?" · "+v.album:''}</div>
                <div style={css("display:flex;align-items:center;gap:clamp(6px,1.2vw,14px);margin-top:14px;flex-wrap:wrap")}>
                  <button onClick={v.shuffleT} style={css(`border:none;background:transparent;cursor:pointer;font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:0;color:${v.shFg}`)}>SHFL</button>
                  <button onClick={v.prev} className="hw" style={css("border:none;background:transparent;cursor:pointer;padding:4px;color:rgba(255,255,255,.75);display:flex")}><svg width="15" height="15" viewBox="0 0 16 16"><path d="M12 2v12L5 8z" fill="currentColor"></path><rect x="3" y="2" width="1.7" height="12" fill="currentColor"></rect></svg></button>
                  <button onClick={v.toggle} className="hs" style={css(`width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:${v.accent};color:#0b0c0e;flex:none;transition:transform .15s`)}>
                    {v.playing&&<svg width="15" height="15" viewBox="0 0 16 16"><rect x="3" y="2.5" width="3.6" height="11" rx="1" fill="currentColor"></rect><rect x="9.4" y="2.5" width="3.6" height="11" rx="1" fill="currentColor"></rect></svg>}
                    {v.paused&&<svg width="15" height="15" viewBox="0 0 16 16"><path d="M4.5 2.5l9.5 5.5-9.5 5.5z" fill="currentColor"></path></svg>}
                  </button>
                  <button onClick={v.next} className="hw" style={css("border:none;background:transparent;cursor:pointer;padding:4px;color:rgba(255,255,255,.75);display:flex")}><svg width="15" height="15" viewBox="0 0 16 16"><path d="M4 2v12l7-6z" fill="currentColor"></path><rect x="11.3" y="2" width="1.7" height="12" fill="currentColor"></rect></svg></button>
                  <button onClick={v.repeatT} style={css(`border:none;background:transparent;cursor:pointer;font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:0;color:${v.rpFg}`)}>LOOP</button>
                  <button onClick={v.likeT} style={css(`border:none;background:transparent;cursor:pointer;font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:0;margin-left:auto;color:${v.lkFg}`)}>{v.lkLabel}</button>
                </div>
                <div onPointerDown={v.seekDown} style={css("margin-top:14px;height:16px;display:flex;align-items:center;cursor:pointer;touch-action:none")}>
                  <div style={css("position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.12);width:100%")}>
                    <div style={css(`position:absolute;top:0;bottom:0;left:0;border-radius:2px;width:${v.prog};background:${v.accent}`)}></div>
                  </div>
                </div>
                <div style={css("display:flex;justify-content:space-between;font:10.5px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.45)")}>
                  <span>{v.cur}</span><span>{v.durS}</span>
                </div>
              </div>
            </div>
            </div>
          </>)}

          {/* VISUALIZER */}
          {this.card(v,'viz',v.layViz,<>
            <div draggable="true" data-wid="viz" onDragStart={v.dragStart} style={css("display:flex;align-items:center;gap:6px;padding:10px 14px 6px;cursor:grab;user-select:none")}>
              <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>VISUALIZER</span>
              <span style={css("margin-left:auto;display:flex;gap:5px")}>
                {v.vizChips.map((c,i)=>(<button key={i} onClick={c.pick} style={css(`font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.08em;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid ${c.bd};background:${c.bg};color:${c.fg}`)}>{c.name}</button>))}
                <button onClick={v.toggleLive} title={v.liveAudio?'Stop reacting to live audio':'React to real audio — share this tab (or your screen) WITH audio'} style={css(`font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.08em;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid ${v.liveAudio?this.hexA(v.accent,.55):'rgba(255,255,255,.14)'};background:${v.liveAudio?this.hexA(v.accent,.16):'transparent'};color:${v.liveAudio?v.accent:'rgba(255,255,255,.5)'}`)}>{v.liveAudio?'● LIVE':'LIVE'}</button>
              </span>
              <span style={css("display:flex;gap:2px;align-items:center")}>
                {this.ic('viz',v.szClick,"Resize","⇲")}{this.ic('viz',v.fsClick,"Fullscreen","⤢")}{this.ic('viz',v.rmClick,"Remove","✕")}
                <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span>
              </span>
            </div>
            <div style={css("flex:1;min-height:0;padding:4px 12px 12px")}>
              <canvas ref={v.vizRef} style={css("width:100%;height:100%;display:block")}></canvas>
            </div>
          </>)}

          {/* LYRICS (time-synced via LRCLIB, with plain-text fallback) */}
          {this.card(v,'lyrics',v.layLyrics,<>
            {this.head(v,'lyrics','LYRICS','10px 14px 2px',true)}
            {v.lyrState==='synced'?(
              <div ref={v.lyrRef} style={css("flex:1;min-height:0;overflow-y:auto;position:relative;padding:14px 16px 60px;scroll-behavior:smooth;-webkit-mask-image:linear-gradient(180deg,transparent,#000 14%,#000 82%,transparent);mask-image:linear-gradient(180deg,transparent,#000 14%,#000 82%,transparent)")}>
                {v.lines.map((ln,i)=><div key={i} onClick={ln.go} style={ln.st}>{ln.text}</div>)}
              </div>
            ):v.lyrState==='plain'?(
              <div style={css("flex:1;min-height:0;overflow-y:auto;padding:12px 16px 20px")}>
                {v.plainLyrics.map((ln,i)=><div key={i} style={css("font-size:14px;line-height:1.55;color:rgba(255,255,255,.62);min-height:9px")}>{ln}</div>)}
              </div>
            ):(
              <div style={css("flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:14px 20px;text-align:center")}>
                {v.lyrState==='loading'&&<span style={css("width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite")}></span>}
                <div style={css("font-size:13px;color:rgba(255,255,255,.45)")}>{v.lyrState==='loading'?'Finding lyrics…':v.lyrState==='instrumental'?'♪ Instrumental':'No lyrics found for this track.'}</div>
              </div>
            )}
            {(v.lyrState==='synced'||v.lyrState==='plain')&&<div style={css("padding:0 14px 8px;font:9px ui-monospace,Menlo,monospace;letter-spacing:.1em;color:rgba(255,255,255,.25);text-align:right")}>LYRICS · LRCLIB</div>}
          </>)}

          {/* QUEUE */}
          {this.card(v,'queue',v.layQueue,<>
            {this.head(v,'queue','UP NEXT · QUEUE','10px 14px 6px',true)}
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:2px 0 10px")}>
              {v.queueItems.length?v.queueItems.map((q,i)=>(
                <div key={i} onClick={q.go} title="Play now" className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer")}>
                  <div style={css(`width:36px;height:36px;border-radius:8px;flex:none;${artCss(q.artUrl)}`)}></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css("font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{q.title}</div>
                    <div style={css("font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{q.artist}</div>
                  </div>
                  <div style={css("font:10.5px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.4)")}>{q.dur}</div>
                </div>
              )):<div style={css("padding:16px;font-size:12px;color:rgba(255,255,255,.35)")}>Queue is empty.</div>}
            </div>
          </>)}

          {/* PLAYLISTS */}
          {this.card(v,'pl',v.layPl,<>
            {this.head(v,'pl','PLAYLISTS','10px 14px 6px',true)}
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:2px 0 10px")}>
              {v.playlists.length?v.playlists.map((p,i)=>(
                <div key={i} onClick={p.play} title="Play playlist" className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer")}>
                  <div style={css(`width:36px;height:36px;border-radius:8px;flex:none;${artCss(p.artUrl)}`)}></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css(`font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${p.fg}`)}>{p.name}</div>
                    <div style={css("font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{p.count} tracks{p.owner?" · "+p.owner:''}</div>
                  </div>
                </div>
              )):<div style={css("padding:16px;font-size:12px;color:rgba(255,255,255,.35)")}>No playlists found.</div>}
            </div>
          </>)}

          {/* VOLUME & EQ (volume is live; EQ bands are cosmetic — no Web API EQ) */}
          {this.card(v,'eq',v.layEq,<>
            <div draggable="true" data-wid="eq" onDragStart={v.dragStart} style={css("display:flex;align-items:center;gap:8px;padding:10px 14px 4px;cursor:grab;user-select:none")}>
              <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>VOLUME & EQ</span>
              <span style={css("margin-left:auto;font:10px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.45)")}>{v.volPct}</span>
              <span style={css("display:flex;gap:2px;align-items:center")}>
                {this.ic('eq',v.fsClick,"Fullscreen","⤢")}{this.ic('eq',v.rmClick,"Remove","✕")}
                <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span>
              </span>
            </div>
            <div onPointerDown={v.volDown} style={css("height:16px;display:flex;align-items:center;cursor:pointer;margin:4px 16px 0;touch-action:none")}>
              <div style={css("position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.12);width:100%")}>
                <div style={css(`position:absolute;top:0;bottom:0;left:0;border-radius:2px;width:${v.volPct};background:${v.accent}`)}></div>
              </div>
            </div>
            <div style={css("display:flex;align-items:center;gap:5px;padding:8px 14px 2px;overflow-x:auto")}>
              <button onClick={v.eqReset} title="Reset EQ" className="hb6" style={css("flex:none;font-size:12px;line-height:1;padding:4px 8px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.14);background:transparent;color:rgba(255,255,255,.55)")}>↺</button>
              {v.eqPresets.map((p,i)=>(
                <button key={i} onClick={p.pick} style={css(`flex:none;font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.06em;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid ${p.active?this.hexA(v.accent,.55):'rgba(255,255,255,.14)'};background:${p.active?this.hexA(v.accent,.16):'transparent'};color:${p.active?v.accent:'rgba(255,255,255,.5)'}`)}>{p.name.toUpperCase()}</button>
              ))}
            </div>
            <div style={css("flex:1;min-height:0;display:flex;gap:8px;padding:2px 16px 12px")}>
              {v.eqBands.map((b,i)=>(
                <div key={i} onPointerDown={b.down} style={css("flex:1;display:flex;flex-direction:column;gap:4px;cursor:ns-resize;min-width:0;touch-action:none")}>
                  <div style={css("flex:1;position:relative;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden")}>
                    <div style={css(`position:absolute;left:0;right:0;bottom:0;height:${b.h};background:${b.bg};transition:height .18s ease-out`)}></div>
                  </div>
                  <div style={css("font:9px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.35);text-align:center")}>{b.label}</div>
                </div>
              ))}
            </div>
          </>)}

          {/* OUTPUT */}
          {this.card(v,'dev',v.layDev,<>
            {this.head(v,'dev','OUTPUT','10px 14px 4px',false)}
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:2px 0 8px")}>
              {v.devices.length?v.devices.map((d,i)=>(
                <div key={i} onClick={d.pick} title="Transfer playback" className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer")}>
                  <span style={css(`width:7px;height:7px;border-radius:50%;flex:none;background:${d.dot}`)}></span>
                  <span style={css(`font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${d.fg}`)}>{d.name}</span>
                  <span style={css("margin-left:auto;flex:none;font:9px ui-monospace,Menlo,monospace;letter-spacing:.12em;color:rgba(255,255,255,.32)")}>{d.type}</span>
                </div>
              )):<div style={css("padding:16px;font-size:12px;color:rgba(255,255,255,.35)")}>No devices found.</div>}
            </div>
          </>)}

          {/* SUGGESTIONS (your Top Tracks — recommendations API is disabled for new apps) */}
          {this.card(v,'recs',v.layRecs,<>
            {this.head(v,'recs','SUGGESTED · YOUR TOP TRACKS','10px 14px 6px',false)}
            <div style={css("flex:1;min-height:0;display:flex;gap:10px;padding:2px 16px 14px;align-items:stretch")}>
              {v.recs.length?v.recs.map((r,i)=>(
                <div key={i} style={css("flex:1;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:8px 10px;min-width:0")}>
                  <div style={css(`width:42px;height:42px;border-radius:9px;flex:none;${artCss(r.artUrl)}`)}></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css("font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{r.title}</div>
                    <div style={css("font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{r.artist}</div>
                  </div>
                  <button onClick={r.add} className="hb6" style={css(`flex:none;white-space:nowrap;font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.08em;padding:5px 9px;border-radius:14px;cursor:pointer;background:transparent;border:1px solid ${r.bd};color:${r.fg}`)}>+ QUEUE</button>
                </div>
              )):<div style={css("padding:14px;font-size:12px;color:rgba(255,255,255,.35)")}>Not enough listening history yet.</div>}
            </div>
          </>)}

          {/* SESSION STATS */}
          {this.card(v,'stats',v.layStats,<>
            {this.head(v,'stats','SESSION','10px 14px 0',false)}
            <div style={css("flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;padding:4px 16px 12px;align-content:center")}>
              <div>
                <div style={css("font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35)")}>MINUTES</div>
                <div style={css("font-size:25px;font-weight:700;font-variant-numeric:tabular-nums")}>{v.statMin}</div>
              </div>
              <div>
                <div style={css("font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35)")}>TRACKS</div>
                <div style={css("font-size:25px;font-weight:700;font-variant-numeric:tabular-nums")}>{v.statTracks}</div>
              </div>
              <div style={css("grid-column:span 2")}>
                <div style={css("font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35)")}>TOP ARTIST</div>
                <div style={css(`font-size:14px;font-weight:600;color:${v.accent}`)}>{v.statTop}</div>
              </div>
            </div>
          </>)}

          {/* CLOCK */}
          {this.card(v,'clock',v.layClock,<>
            {this.head(v,'clock','CLOCK','10px 14px 0',false)}
            <div style={css("flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 16px 12px")}>
              <div style={css("font-size:32px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1.1")}>{v.clockTime}</div>
              <div style={css("font-size:12px;color:rgba(255,255,255,.5);margin-top:2px")}>{v.clockDate}</div>
              <div style={css(`margin-top:8px;font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:${v.accent}`)}>{v.greeting}</div>
            </div>
          </>)}

          {/* RECENTLY PLAYED */}
          {this.card(v,'hist',v.layHist,<>
            {this.head(v,'hist','RECENTLY PLAYED','10px 14px 4px',true)}
            <div style={css(`flex:1;min-height:0;display:flex;gap:10px;padding:2px 16px 12px;overflow-x:auto;align-items:flex-start;flex-wrap:${v.histWrap}`)}>
              {v.hist.map((h,i)=>(
                <div key={i} style={css("flex:none;width:72px")}>
                  <div style={css(`width:72px;height:64px;border-radius:10px;${artCss(h.artUrl)}`)}></div>
                  <div style={css("font-size:9.5px;color:rgba(255,255,255,.5);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{h.title}</div>
                </div>
              ))}
            </div>
          </>)}

          {/* SEARCH */}
          {this.card(v,'search',v.laySearch,<>
            {this.head(v,'search','SEARCH','10px 14px 6px',true)}
            <div style={css("padding:0 14px 8px;display:flex;flex-direction:column;gap:7px")}>
              <div style={css("display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:7px 10px")}>
                <svg width="12" height="12" viewBox="0 0 16 16" style={css("flex:none;opacity:.45")}><circle cx="7" cy="7" r="5" fill="none" stroke="currentColor" strokeWidth="1.6"></circle><path d="M11 11l4 4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"></path></svg>
                <input value={v.q} onChange={v.onSearchInput} onKeyDown={v.onSearchKey} placeholder="Search Spotify…"
                  style={css("flex:1;min-width:0;background:transparent;border:none;outline:none;color:#ececf1;font-size:13px;font-family:inherit")}/>
                {v.q&&<button onClick={v.clearSearch} title="Clear" className="hw" style={css("flex:none;border:none;background:transparent;cursor:pointer;padding:0 2px;color:rgba(255,255,255,.4);font-size:11px;line-height:1")}>✕</button>}
              </div>
              <div style={css("display:flex;gap:5px;overflow-x:auto")}>
                {v.searchTypes.map((t,i)=>(
                  <button key={i} onClick={t.pick} style={css(`flex:none;font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.06em;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid ${t.active?this.hexA(v.accent,.55):'rgba(255,255,255,.14)'};background:${t.active?this.hexA(v.accent,.16):'transparent'};color:${t.active?v.accent:'rgba(255,255,255,.5)'}`)}>{t.name}</button>
                ))}
              </div>
            </div>
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:0 0 10px")}>
              {v.searching?(
                <div style={css("display:flex;align-items:center;gap:9px;padding:12px 16px;color:rgba(255,255,255,.5);font-size:12.5px")}>
                  <span style={css("width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite")}></span>
                  Searching…
                </div>
              ):v.results.length?v.results.map((r,i)=>(
                <div key={r.id+'-'+i} onClick={r.play} title={r.kind==='track'?'Play now':'Play'} className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer")}>
                  <div style={css(`width:34px;height:34px;border-radius:${r.kind==='artist'?'50%':'7px'};flex:none;${artCss(r.art)}`)}></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css("font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{r.title}</div>
                    <div style={css("font-size:10.5px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{r.sub}</div>
                  </div>
                  {r.meta&&<div style={css("flex:none;font:9.5px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.35)")}>{r.meta}</div>}
                  {r.kind==='track'&&<button onClick={r.queue} title="Add to queue" className="hw" style={css("flex:none;border:none;background:transparent;cursor:pointer;padding:2px 4px;color:rgba(255,255,255,.4);font-size:15px;line-height:1")}>+</button>}
                </div>
              )):(
                <div style={css("padding:12px 16px;font-size:12px;line-height:1.5;color:rgba(255,255,255,.35)")}>{v.q.trim()?'No results.':'Search tracks, albums, artists or playlists — then click to play.'}</div>
              )}
            </div>
          </>)}

          {/* FUN FACTS (AI, Groq via serve.py) */}
          {this.card(v,'facts',v.layFacts,<>
            <div draggable="true" data-wid="facts" onDragStart={v.dragStart} style={css("display:flex;align-items:center;gap:8px;padding:10px 14px 4px;cursor:grab;user-select:none")}>
              <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>FUN FACT</span>
              <span style={css("margin-left:auto;display:flex;gap:2px;align-items:center")}>
                {this.ic('facts',v.factRefresh,"Another fact","↻")}
                {this.ic('facts',v.fsClick,"Fullscreen","⤢")}{this.ic('facts',v.rmClick,"Remove","✕")}
                <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span>
              </span>
            </div>
            <div style={css("flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:8px;padding:4px 18px 14px;overflow-y:auto")}>
              {v.factState==='loading'?(
                <div style={css("display:flex;align-items:center;gap:9px;color:rgba(255,255,255,.5);font-size:13px")}>
                  <span style={css("width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;display:inline-block;animation:spin .7s linear infinite")}></span>
                  Digging up a fact…
                </div>
              ):v.factState==='ok'?(<>
                <div style={css("font-size:15px;line-height:1.5;color:rgba(255,255,255,.82)")}>
                  <span style={css(`color:${v.accent};font-weight:700;margin-right:7px`)}>✦</span>{v.fact}
                </div>
                <div style={css("font:9px ui-monospace,Menlo,monospace;letter-spacing:.1em;color:rgba(255,255,255,.25)")}>AI-GENERATED · GROQ · MAY VARY</div>
              </>):(
                <div style={css("font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.4)")}>{v.factState==='error'?v.factMsg:'Play a track to get a fun fact.'}</div>
              )}
            </div>
          </>)}

        </div>
      </div>
    );
  }
}

// ---------------------------------------------------------------------------
// Connect screen (shown until a valid Spotify token exists)
// ---------------------------------------------------------------------------
function Connect({error}){
  const box=css("min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px");
  const card=css("width:100%;max-width:440px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:34px 30px");
  return (
    <div style={box}>
      <div style={card}>
        <div style={css("font-family:'Archivo Black',sans-serif;font-size:40px;text-transform:uppercase;letter-spacing:.02em;background-image:linear-gradient(135deg,#4fd8c0 10%,#fff 60%,rgba(79,216,192,.55));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent")}>Wax</div>
        <div style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4);margin-top:4px")}>SESSION DASHBOARD · SPOTIFY</div>
        <p style={css("font-size:13.5px;line-height:1.6;color:rgba(255,255,255,.6);margin:22px 0 20px")}>Connect your Spotify Premium account to control playback, browse your playlists, and drive the dashboard with live data. Audio plays right in this tab.</p>
        {error&&<div style={css("font-size:12px;color:#ff9d9d;background:rgba(240,90,90,.12);border:1px solid rgba(240,90,90,.3);border-radius:10px;padding:9px 12px;margin-bottom:16px")}>{error}</div>}
        {!SERVED_OK?(
          <div style={css("font-size:12.5px;line-height:1.7;color:rgba(255,255,255,.72);background:rgba(240,180,90,.1);border:1px solid rgba(240,180,90,.35);border-radius:12px;padding:14px 16px")}>
            <b style={css("color:#ffd79a")}>Open this over a local server, not a file.</b> You loaded it from <code style={css("color:#ffd79a;word-break:break-all")}>{location.href}</code>. Spotify rejects <code>file://</code> logins. Run <code style={css("color:#7fd0bf")}>python -m http.server 5173 --bind 127.0.0.1</code> in the project folder, then open <a href={SERVE_URL} style={css("color:#7fd0bf")}>{SERVE_URL}</a>.
          </div>
        ):CONFIGURED?(
          <button onClick={beginAuth} className="spgreen" style={css("width:100%;border:none;border-radius:24px;padding:14px;background:#1db954;color:#04120a;font-size:14px;font-weight:700;letter-spacing:.02em;cursor:pointer;transition:transform .15s,background .15s")}>Connect Spotify</button>
        ):(
          <div style={css("font-size:12.5px;line-height:1.7;color:rgba(255,255,255,.6);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px")}>
            <b style={css("color:#fff")}>Setup needed.</b> Open <code style={css("color:#7fd0bf")}>index.html</code> and set <code style={css("color:#7fd0bf")}>CONFIG.clientId</code> to your Spotify app's Client ID.
          </div>
        )}
        <div style={css("margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);font-size:11.5px;line-height:1.7;color:rgba(255,255,255,.45)")}>
          <div style={css("font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35);margin-bottom:6px")}>REDIRECT URI TO REGISTER</div>
          <code style={css("display:block;word-break:break-all;color:#aee7da;background:rgba(0,0,0,.3);border-radius:8px;padding:8px 10px;font-size:11.5px")}>{REDIRECT_URI}</code>
          <div style={css("margin-top:8px")}>Add this exact value under your app's <b>Redirect URIs</b> at developer.spotify.com/dashboard.</div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [ready,setReady]=React.useState(false);
  const [authed,setAuthed]=React.useState(false);
  const [error,setError]=React.useState(null);
  React.useEffect(()=>{(async()=>{
    const url=new URL(location.href);
    const code=url.searchParams.get('code');
    const authErr=url.searchParams.get('error');
    if(authErr){setError('Authorization was cancelled or denied.');}
    if(code){
      const st=url.searchParams.get('state');
      const saved=sessionStorage.getItem('wax-auth-state');
      try{
        if(saved&&st&&saved!==st) throw new Error('State mismatch — please try again.');
        await exchangeCode(code);
      }catch(e){setError(String(e.message||e));}
      history.replaceState({},'',REDIRECT_URI);
    }
    let tok=null; try{tok=await validToken();}catch(e){}
    setAuthed(!!tok); setReady(true);
  })();},[]);
  if(!ready) return <div style={css("min-height:100vh")}></div>;
  return authed? <Dashboard/> : <Connect error={error}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
