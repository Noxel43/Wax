// ---------------------------------------------------------------------------
// css(): turn an inline CSS text string into a React style object.
// Lets us keep the original design's style strings verbatim (dynamic values
// interpolated via template literals), so the port stays faithful.
// ---------------------------------------------------------------------------
function css(text){
  const o={};
  String(text).split(';').forEach(decl=>{
    const i=decl.indexOf(':');
    if(i<0) return;
    const k=decl.slice(0,i).trim();
    const val=decl.slice(i+1).trim();
    if(!k) return;
    const key=k.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
    o[key]=val;
  });
  return o;
}

      queueItems:s.queue.map((si,pos)=>({title:this.songs[si].title,artist:this.songs[si].artist,dur:this.fmt(this.songs[si].dur),art:this.songs[si].art,go:()=>this.goQueue(pos)})),

        len:this.fmt(p.tracks.reduce((a,ti)=>a+this.songs[ti].dur,0)),
        art:this.songs[p.tracks[0]].art,fg:s.activePl===pi?ac:'#ffffff',
        play:()=>this.playPl(pi)})),
      eqBands:s.eq.map((v,i)=>({h:(8+v*92)+'%',label:['60','250','1K','4K','12K'][i],
        bg:'linear-gradient(180deg,'+this.hexA(ac,.9)+','+this.hexA(ac,.3)+')',
        down:(e)=>this.barDrag(e,(fx,fy)=>this.setState(st=>{const eq=st.eq.slice();eq[i]=fy;return{eq:eq};}))})),
      devices:this.deviceList.map((dv,i)=>({name:dv.name,type:dv.type,pick:()=>this.setState({device:i}),
        dot:i===s.device?ac:'rgba(255,255,255,.18)',fg:i===s.device?'#ffffff':'rgba(255,255,255,.6)'})),
      recs:pool.map(i=>({title:this.songs[i].title,artist:this.songs[i].artist,art:this.songs[i].art,
        bd:this.hexA(ac,.45),fg:ac,add:()=>this.setState(st=>({queue:[...st.queue,i]}))})),
      statMin:47+Math.floor(s.listen/60),statTracks:s.played,statTop:this.songs[top].artist,
      clockTime:pad(hr)+':'+pad(d.getMinutes())+secs,
      clockDate:d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}),
      greeting:hr<5?'LATE NIGHT':hr<12?'GOOD MORNING':hr<18?'GOOD AFTERNOON':'GOOD EVENING',
      hist:s.history.map(i=>({title:this.songs[i].title,art:this.songs[i].art}))
    };
  }

  // --- render helpers ------------------------------------------------------
  ic(v,wid,on,title,glyph){
    return <button data-wid={wid} onClick={on} title={title} className="hw"
      style={css("border:none;background:transparent;cursor:pointer;padding:2px 5px;color:rgba(255,255,255,.35);font-size:11px;line-height:1")}>{glyph}</button>;
  }
  ctrls(v,wid,sz){
    return <span style={css("margin-left:auto;display:flex;gap:2px;align-items:center")}>
      {sz && this.ic(v,wid,v.szClick,"Resize","⇲")}
      {this.ic(v,wid,v.fsClick,"Fullscreen","⤢")}
      {this.ic(v,wid,v.rmClick,"Remove","✕")}
      <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span>
    </span>;
  }
  head(v,wid,label,padPx,sz){
    return <div draggable="true" data-wid={wid} onDragStart={v.dragStart}
      style={css("display:flex;align-items:center;gap:8px;padding:"+padPx+";cursor:grab;user-select:none")}>
      <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>{label}</span>
      {this.ctrls(v,wid,sz)}
    </div>;
  }
  card(v,wid,lay,children){
    return <div data-wid={wid} onDragOver={v.dragOver} onDragLeave={v.dragLeave} onDrop={v.drop}
      style={css(`background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;${lay}`)}>
      {children}
    </div>;
  }

  render(){
    const v=this.renderVals();
    return (
      <div style={css(`min-height:100vh;padding:20px 22px 26px;transition:background 1.2s;background:${v.bg}`)}>

        {/* header bar */}
        <div style={{...css("display:flex;align-items:center;gap:10px;margin:2px 6px;transition:max-height .35s,opacity .35s,margin .35s"), ...css(v.barSt)}}>
          <span style={css(`font-family:'Archivo Black',sans-serif;font-size:26px;line-height:1;letter-spacing:.02em;text-transform:uppercase;background:${v.logoGrad};-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent`)}>Wax</span>
          <span style={css("font:500 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>SESSION DASHBOARD</span>
          <span style={css("margin-left:auto;font:500 10px ui-monospace,Menlo,monospace;letter-spacing:.1em;color:rgba(255,255,255,.3)")}>DRAG HEADERS TO REARRANGE</span>
          <div style={css("position:relative;flex:none")}>
            <button onClick={v.themeT} style={css(`font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:6px 12px;border-radius:16px;cursor:pointer;border:1px solid ${v.themeBd};background:${v.themeBg};color:${v.themeFg}`)}>THEME {"▾"}</button>
            {v.themeOpen && (
              <div style={css("position:absolute;top:32px;right:0;z-index:90;background:#15161a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;min-width:190px;box-shadow:0 20px 50px rgba(0,0,0,.55);animation:dropIn .18s cubic-bezier(.2,.9,.3,1.2) both;transform-origin:top right")}>
                {v.themeItems.map((th,i)=>(
                  <div key={i} onClick={th.pick} className="hb6" style={css("display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer")}>
                    <span style={css(`width:12px;height:12px;border-radius:50%;flex:none;background:${th.swatch}`)}></span>
                    <span style={css(`font-size:13px;font-weight:500;color:${th.fg}`)}>{th.name}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={css("position:relative;flex:none")}>
            <button onClick={v.menuT} style={css(`font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:6px 12px;border-radius:16px;cursor:pointer;border:1px solid ${v.menuBd};background:${v.menuBg};color:${v.menuFg}`)}>WIDGETS {"▾"}</button>
            {v.menuOpen && (
              <div style={css("position:absolute;top:32px;right:0;z-index:90;background:#15161a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px;min-width:210px;box-shadow:0 20px 50px rgba(0,0,0,.55);animation:dropIn .18s cubic-bezier(.2,.9,.3,1.2) both;transform-origin:top right")}>
                {v.menuItems.map((m,i)=>(
                  <div key={i} onClick={m.toggle} className="hb6" style={css("display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer")}>
                    <span style={css(`width:7px;height:7px;border-radius:50%;flex:none;background:${m.dot}`)}></span>
                    <span style={css(`font-size:13px;font-weight:500;color:${m.fg}`)}>{m.name}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* header collapse toggle */}
        <div style={css("display:flex;justify-content:center;margin:0 0 10px")}>
          <button onClick={v.barT} title={v.barTip} className="hw" style={css("border:none;background:transparent;cursor:pointer;padding:2px 20px;color:rgba(255,255,255,.3);font-size:10px;line-height:1")}>{v.barGlyph}</button>
        </div>

        {/* widget grid */}
        <div style={css("display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:148px;gap:14px;grid-auto-flow:dense")}>

          {/* NOW PLAYING */}
          {this.card(v,'now',v.layNow, <>
            {this.head(v,'now','NOW PLAYING','10px 14px 0',false)}
            <div style={css("flex:1;display:flex;gap:18px;padding:10px 20px 18px;min-height:0;align-items:center")}>
              <div style={css(`width:clamp(96px,34%,176px);flex:none;aspect-ratio:1;border-radius:14px;background:${v.artBg};box-shadow:0 14px 44px rgba(0,0,0,.5)`)}></div>
              <div style={css("flex:1;min-width:0;display:flex;flex-direction:column;gap:4px")}>
                <div style={css("font-size:28px;font-weight:700;line-height:1.12;letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{v.title}</div>
                <div style={css("font-size:14px;color:rgba(255,255,255,.58);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{v.artist} {"·"} {v.album}</div>
                <div style={css("display:flex;align-items:center;gap:clamp(6px,1.2vw,14px);margin-top:14px;flex-wrap:wrap")}>
                  <button onClick={v.shuffleT} style={css(`border:none;background:transparent;cursor:pointer;font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:0;color:${v.shFg}`)}>SHFL</button>
                  <button onClick={v.prev} className="hw" style={css("border:none;background:transparent;cursor:pointer;padding:4px;color:rgba(255,255,255,.75);display:flex")}><svg width="15" height="15" viewBox="0 0 16 16"><path d="M12 2v12L5 8z" fill="currentColor"></path><rect x="3" y="2" width="1.7" height="12" fill="currentColor"></rect></svg></button>
                  <button onClick={v.toggle} className="hs" style={css(`width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;background:${v.accent};color:#0b0c0e;flex:none;transition:transform .15s`)}>
                    {v.playing && <svg width="15" height="15" viewBox="0 0 16 16"><rect x="3" y="2.5" width="3.6" height="11" rx="1" fill="currentColor"></rect><rect x="9.4" y="2.5" width="3.6" height="11" rx="1" fill="currentColor"></rect></svg>}
                    {v.paused && <svg width="15" height="15" viewBox="0 0 16 16"><path d="M4.5 2.5l9.5 5.5-9.5 5.5z" fill="currentColor"></path></svg>}
                  </button>
                  <button onClick={v.next} className="hw" style={css("border:none;background:transparent;cursor:pointer;padding:4px;color:rgba(255,255,255,.75);display:flex")}><svg width="15" height="15" viewBox="0 0 16 16"><path d="M4 2v12l7-6z" fill="currentColor"></path><rect x="11.3" y="2" width="1.7" height="12" fill="currentColor"></rect></svg></button>
                  <button onClick={v.repeatT} style={css(`border:none;background:transparent;cursor:pointer;font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:0;color:${v.rpFg}`)}>LOOP</button>
                  <button onClick={v.likeT} style={css(`border:none;background:transparent;cursor:pointer;font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.12em;padding:0;margin-left:auto;color:${v.lkFg}`)}>{v.lkLabel}</button>
                </div>
                <div onPointerDown={v.seekDown} style={css("margin-top:14px;height:16px;display:flex;align-items:center;cursor:pointer;touch-action:none")}>
                  <div style={css("position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.12);width:100%")}>
                    <div style={css(`position:absolute;top:0;bottom:0;left:0;border-radius:2px;width:${v.prog};background:${v.accent}`)}></div>
                  </div>
                </div>
                <div style={css("display:flex;justify-content:space-between;font:10.5px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.45)")}>
                  <span>{v.cur}</span><span>{v.durS}</span>
                </div>
              </div>
            </div>
          </>)}

          {/* VISUALIZER */}
          {this.card(v,'viz',v.layViz, <>
            <div draggable="true" data-wid="viz" onDragStart={v.dragStart} style={css("display:flex;align-items:center;gap:6px;padding:10px 14px 6px;cursor:grab;user-select:none")}>
              <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>VISUALIZER</span>
              <span style={css("margin-left:auto;display:flex;gap:5px")}>
                {v.vizChips.map((c,i)=>(
                  <button key={i} onClick={c.pick} style={css(`font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.08em;padding:4px 9px;border-radius:20px;cursor:pointer;border:1px solid ${c.bd};background:${c.bg};color:${c.fg}`)}>{c.name}</button>
                ))}
              </span>
              <span style={css("display:flex;gap:2px;align-items:center")}>
                {this.ic(v,'viz',v.szClick,"Resize","⇲")}
                {this.ic(v,'viz',v.fsClick,"Fullscreen","⤢")}
                {this.ic(v,'viz',v.rmClick,"Remove","✕")}
                <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span>
              </span>
            </div>
            <div style={css("flex:1;min-height:0;padding:4px 12px 12px")}>
              <canvas ref={v.vizRef} style={css("width:100%;height:100%;display:block")}></canvas>
            </div>
          </>)}

          {/* LYRICS */}
          {this.card(v,'lyrics',v.layLyrics, <>
            {this.head(v,'lyrics','LYRICS','10px 14px 2px',true)}
            <div ref={v.lyrRef} style={css("flex:1;min-height:0;overflow-y:auto;position:relative;padding:14px 16px 60px;scroll-behavior:smooth;-webkit-mask-image:linear-gradient(180deg,transparent,#000 14%,#000 82%,transparent);mask-image:linear-gradient(180deg,transparent,#000 14%,#000 82%,transparent)")}>
              {v.lines.map((ln,i)=>(
                <div key={i} onClick={ln.go} style={ln.st}>{ln.text}</div>
              ))}
            </div>
          </>)}

          {/* QUEUE */}
          {this.card(v,'queue',v.layQueue, <>
            {this.head(v,'queue','UP NEXT · QUEUE','10px 14px 6px',true)}
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:2px 0 10px")}>
              {v.queueItems.map((q,i)=>(
                <div key={i} onClick={q.go} className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer")}>
                  <div style={css(`width:36px;height:36px;border-radius:8px;flex:none;background:${q.art}`)}></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css("font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{q.title}</div>
                    <div style={css("font-size:11px;color:rgba(255,255,255,.5)")}>{q.artist}</div>
                  </div>
                  <div style={css("font:10.5px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.4)")}>{q.dur}</div>
                </div>
              ))}
            </div>
          </>)}

          {/* PLAYLISTS */}
          {this.card(v,'pl',v.layPl, <>
            {this.head(v,'pl','PLAYLISTS','10px 14px 6px',true)}
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:2px 0 10px")}>
              {v.playlists.map((p,i)=>(
                <div key={i} onClick={p.play} className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer")}>
                  <div style={css(`width:36px;height:36px;border-radius:8px;flex:none;background:${p.art};display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85)`)}><svg width="11" height="11" viewBox="0 0 16 16"><path d="M4.5 2.5l9.5 5.5-9.5 5.5z" fill="currentColor"></path></svg></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css(`font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${p.fg}`)}>{p.name}</div>
                    <div style={css("font-size:11px;color:rgba(255,255,255,.5)")}>{p.count} tracks {"·"} {p.len}</div>
                  </div>
                </div>
              ))}
            </div>
          </>)}

          {/* VOLUME & EQ */}
          {this.card(v,'eq',v.layEq, <>
            <div draggable="true" data-wid="eq" onDragStart={v.dragStart} style={css("display:flex;align-items:center;gap:8px;padding:10px 14px 4px;cursor:grab;user-select:none")}>
              <span style={css("font:600 10px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:rgba(255,255,255,.4)")}>VOLUME & EQ</span>
              <span style={css("margin-left:auto;font:10px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.45)")}>{v.volPct}</span>
              <span style={css("display:flex;gap:2px;align-items:center")}>
                {this.ic(v,'eq',v.fsClick,"Fullscreen","⤢")}
                {this.ic(v,'eq',v.rmClick,"Remove","✕")}
                <span style={css("color:rgba(255,255,255,.22);font-size:12px")}>{"⠿"}</span>
              </span>
            </div>
            <div onPointerDown={v.volDown} style={css("height:16px;display:flex;align-items:center;cursor:pointer;margin:0 16px;touch-action:none")}>
              <div style={css("position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.12);width:100%")}>
                <div style={css(`position:absolute;top:0;bottom:0;left:0;border-radius:2px;width:${v.volPct};background:${v.accent}`)}></div>
              </div>
            </div>
            <div style={css("flex:1;min-height:0;display:flex;gap:8px;padding:4px 16px 12px")}>
              {v.eqBands.map((b,i)=>(
                <div key={i} onPointerDown={b.down} style={css("flex:1;display:flex;flex-direction:column;gap:4px;cursor:ns-resize;min-width:0;touch-action:none")}>
                  <div style={css("flex:1;position:relative;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden")}>
                    <div style={css(`position:absolute;left:0;right:0;bottom:0;height:${b.h};background:${b.bg}`)}></div>
                  </div>
                  <div style={css("font:9px ui-monospace,Menlo,monospace;color:rgba(255,255,255,.35);text-align:center")}>{b.label}</div>
                </div>
              ))}
            </div>
          </>)}

          {/* OUTPUT */}
          {this.card(v,'dev',v.layDev, <>
            {this.head(v,'dev','OUTPUT','10px 14px 4px',false)}
            <div style={css("flex:1;min-height:0;overflow-y:auto;padding:2px 0 8px")}>
              {v.devices.map((d,i)=>(
                <div key={i} onClick={d.pick} className="hb5" style={css("display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer")}>
                  <span style={css(`width:7px;height:7px;border-radius:50%;flex:none;background:${d.dot}`)}></span>
                  <span style={css(`font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:${d.fg}`)}>{d.name}</span>
                  <span style={css("margin-left:auto;flex:none;font:9px ui-monospace,Menlo,monospace;letter-spacing:.12em;color:rgba(255,255,255,.32)")}>{d.type}</span>
                </div>
              ))}
            </div>
          </>)}

          {/* SUGGESTIONS */}
          {this.card(v,'recs',v.layRecs, <>
            {this.head(v,'recs','SUGGESTED FOR THIS SESSION','10px 14px 6px',false)}
            <div style={css("flex:1;min-height:0;display:flex;gap:10px;padding:2px 16px 14px;align-items:stretch")}>
              {v.recs.map((r,i)=>(
                <div key={i} style={css("flex:1;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:8px 10px;min-width:0")}>
                  <div style={css(`width:42px;height:42px;border-radius:9px;flex:none;background:${r.art}`)}></div>
                  <div style={css("min-width:0;flex:1")}>
                    <div style={css("font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{r.title}</div>
                    <div style={css("font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{r.artist}</div>
                  </div>
                  <button onClick={r.add} className="hb6" style={css(`flex:none;white-space:nowrap;font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.08em;padding:5px 9px;border-radius:14px;cursor:pointer;background:transparent;border:1px solid ${r.bd};color:${r.fg}`)}>+ QUEUE</button>
                </div>
              ))}
            </div>
          </>)}

          {/* SESSION STATS */}
          {this.card(v,'stats',v.layStats, <>
            {this.head(v,'stats','SESSION','10px 14px 0',false)}
            <div style={css("flex:1;display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;padding:4px 16px 12px;align-content:center")}>
              <div>
                <div style={css("font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35)")}>MINUTES</div>
                <div style={css("font-size:25px;font-weight:700;font-variant-numeric:tabular-nums")}>{v.statMin}</div>
              </div>
              <div>
                <div style={css("font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35)")}>TRACKS</div>
                <div style={css("font-size:25px;font-weight:700;font-variant-numeric:tabular-nums")}>{v.statTracks}</div>
              </div>
              <div style={css("grid-column:span 2")}>
                <div style={css("font:600 8.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;color:rgba(255,255,255,.35)")}>TOP ARTIST</div>
                <div style={css(`font-size:14px;font-weight:600;color:${v.accent}`)}>{v.statTop}</div>
              </div>
            </div>
          </>)}

          {/* CLOCK */}
          {this.card(v,'clock',v.layClock, <>
            {this.head(v,'clock','CLOCK','10px 14px 0',false)}
            <div style={css("flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 16px 12px")}>
              <div style={css("font-size:32px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums;line-height:1.1")}>{v.clockTime}</div>
              <div style={css("font-size:12px;color:rgba(255,255,255,.5);margin-top:2px")}>{v.clockDate}</div>
              <div style={css(`margin-top:8px;font:600 9px ui-monospace,Menlo,monospace;letter-spacing:.16em;color:${v.accent}`)}>{v.greeting}</div>
            </div>
          </>)}

          {/* RECENTLY PLAYED */}
          {this.card(v,'hist',v.layHist, <>
            {this.head(v,'hist','RECENTLY PLAYED','10px 14px 4px',true)}
            <div style={css(`flex:1;min-height:0;display:flex;gap:10px;padding:2px 16px 12px;overflow-x:auto;align-items:flex-start;flex-wrap:${v.histWrap}`)}>
              {v.hist.map((h,i)=>(
                <div key={i} style={css("flex:none;width:72px")}>
                  <div style={css(`width:72px;height:64px;border-radius:10px;background:${h.art}`)}></div>
                  <div style={css("font-size:9.5px;color:rgba(255,255,255,.5);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{h.title}</div>
                </div>
              ))}
            </div>
          </>)}

        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<Component/>);
</script>
</body>
</html>
